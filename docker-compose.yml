version: "3.9"

services:
  auth-service:
    image: zoubairmabrouk/auth-service:latest
    container_name: auth-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AuthServiceDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=auth-service
      - Jwt__Audience=platform-services
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - platform-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: auth-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1'"
      ]
      interval: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - platform-network

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - platform-network

volumes:
  sqlserver_data:

networks:
  platform-network:
    driver: bridge